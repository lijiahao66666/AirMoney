<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="哎呀钱">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>哎呀钱</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }
    #flutter-loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      border-radius: 16px;
      background: #4CAF50;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(76, 175, 80, 0.25);
    }
    .loading-logo img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
    }
    .loading-title {
      font-size: 24px;
      font-weight: 700;
      color: #2E7D32;
      margin-bottom: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-subtitle {
      font-size: 13px;
      color: #4CAF50;
      margin-bottom: 32px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #A5D6A7;
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="flutter-loading">
    <div class="loading-logo">
      <img src="icons/Icon-192.png" alt="Logo" />
    </div>
    <div class="loading-title">哎呀钱</div>
    <div class="loading-subtitle">智能记账助手</div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('flutter-loading');
      if (loading) {
        loading.classList.add('fade-out');
        setTimeout(function() {
          loading.remove();
        }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
